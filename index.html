<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 単語クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --card: #1e1e2e;
    --border: #2e2e45;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --correct: #4ade80;
    --wrong: #f87171;
    --text: #e8e8f0;
    --muted: #8888aa;
    --line-color: #7c6af7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Score / Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 28px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .stat-label { color: var(--muted); font-size: 10px; letter-spacing: 2px; }
  .stat-value { color: var(--text); font-size: 18px; font-weight: 700; }
  .stat-value.good { color: var(--correct); }
  .stat-value.bad { color: var(--wrong); }

  /* Quiz arena */
  .quiz-arena {
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    align-items: start;
    min-height: 400px;
  }

  /* SVG canvas for lines */
  #line-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 8px;
  }

  .col-header {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .word-card {
    position: relative;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    text-align: center;
  }

  .word-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(124,106,247,0.15);
  }

  .word-card.selected {
    border-color: var(--accent);
    background: rgba(124,106,247,0.12);
    box-shadow: 0 0 0 2px rgba(124,106,247,0.3);
  }

  .word-card.matched {
    border-color: var(--correct);
    background: rgba(74,222,128,0.08);
    cursor: default;
    opacity: 0.7;
  }

  .word-card.wrong-flash {
    border-color: var(--wrong);
    background: rgba(248,113,113,0.12);
    animation: wrongShake 0.35s ease;
  }

  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .word-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .word-hira {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
  }

  .word-kr {
    font-size: 13px;
    line-height: 1.4;
  }

  /* Center divider */
  .center-divider {
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--border), transparent);
    align-self: stretch;
    margin: 40px 0;
    position: relative;
    z-index: 1;
  }

  /* Connector dots */
  .dot {
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--accent);
    transition: background 0.2s;
    z-index: 10;
  }

  .left-col .dot { right: -6px; }
  .right-col .dot { left: -6px; right: auto; }

  .word-card.matched .dot { background: var(--correct); border-color: var(--correct); }
  .word-card.selected .dot { background: var(--accent); }

  /* Message overlay */
  .message {
    text-align: center;
    padding: 16px;
    border-radius: 10px;
    font-size: 14px;
    margin: 16px 0;
    font-weight: 600;
    letter-spacing: 1px;
    display: none;
  }

  .message.show { display: block; }
  .message.success { background: rgba(74,222,128,0.1); border: 1px solid var(--correct); color: var(--correct); }
  .message.error { background: rgba(248,113,113,0.1); border: 1px solid var(--wrong); color: var(--wrong); }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 8px;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.18s ease;
    font-weight: 700;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6a58e0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,106,247,0.4); }

  .btn-outline {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%,80%,100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Results screen */
  .results-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.4s ease;
  }

  .results-screen.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .results-score {
    font-family: 'Space Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--correct), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-label {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 4px;
    height: 6px;
    width: 200px;
    margin: 0 auto 32px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--correct));
    border-radius: 4px;
    transition: width 1s ease;
  }

  /* Error */
  .error-screen {
    text-align: center;
    padding: 60px 20px;
    color: var(--wrong);
    font-size: 14px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Japanese Vocabulary</div>
    <h1>単語マッチング</h1>
    <div class="subtitle">단어와 의미를 연결하세요</div>
  </header>

  <div class="status-bar">
    <div class="stat">
      <span class="stat-label">라운드</span>
      <span class="stat-value" id="round-num">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">총 단어</span>
      <span class="stat-value" id="total-words">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">정답</span>
      <span class="stat-value good" id="score-correct">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">오답</span>
      <span class="stat-value bad" id="score-wrong">0</span>
    </div>
  </div>

  <div id="main-area">
    <div class="loading" id="loading-screen">
      단어 불러오는 중<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
    </div>

    <div id="quiz-area" style="display:none;">
      <div class="message" id="msg-box"></div>
      <div class="quiz-arena" id="arena">
        <svg id="line-canvas"></svg>
        <div class="column left-col" id="left-col">
          <div class="col-header">단어</div>
        </div>
        <div class="center-divider"></div>
        <div class="column right-col" id="right-col">
          <div class="col-header">의미</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="skipRound()">건너뛰기</button>
        <button class="btn btn-primary" id="next-btn" onclick="nextRound()" style="display:none;">다음 라운드 →</button>
      </div>
    </div>

    <div class="results-screen" id="results-screen">
      <div class="results-score" id="results-pct">0%</div>
      <div class="results-label">퀴즈 완료!</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="results-bar" style="width:0%"></div>
      </div>
      <p style="color:var(--muted); font-size:13px; margin-bottom: 32px;" id="results-detail"></p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="restartQuiz()">다시 시작</button>
      </div>
    </div>

    <div class="error-screen" id="error-screen" style="display:none;">
      <p>⚠️ 데이터를 불러올 수 없습니다.</p>
      <p style="font-size:12px; margin-top:12px; color: var(--muted);">구글 시트가 <strong>"링크가 있는 모든 사용자"</strong>에게 공개되어 있는지 확인하세요.</p>
      <button class="btn btn-outline" onclick="loadData()" style="margin-top:20px;">다시 시도</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1F-MzECDTU_S_6lR6_FJLpXOAih4Kg1SjHTCUeqgzOqo';
const SHEET_NAME = 'Raw_Data';
const ITEMS_PER_ROUND = 4;

let allWords = [];
let usedIndices = new Set();
let currentRound = [];
let selectedLeft = null;
let selectedRight = null;
let matched = {};
let scoreCorrect = 0;
let scoreWrong = 0;
let round = 1;
let totalRounds = 0;
let lines = [];

// ── Load data ──────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('error-screen').style.display = 'none';

  // Try multiple sheet name options
  const sheetNames = ['Raw_Data'];
  let loaded = false;

  for (const name of sheetNames) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes('error') || text.trim().length < 10) continue;

      const rows = parseCSV(text);
      // Find header row: Original, Hiragana, Meaning
      let dataRows = rows;
      if (rows[0] && (rows[0][0].includes('Original') || rows[0][0].includes('원') || rows[0][0].includes('단어'))) {
        dataRows = rows.slice(1);
      }

      const words = dataRows
        .filter(r => r[0] && r[0].trim() && r[2] && r[2].trim())
        .map(r => ({
          original: r[0].trim(),
          hiragana: r[1] ? r[1].trim() : '',
          meaning: r[2].trim()
        }));

      if (words.length > 0) {
        allWords = words;
        loaded = true;
        break;
      }
    } catch (e) { /* try next */ }
  }

  if (!loaded || allWords.length === 0) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'block';
    return;
  }

  document.getElementById('total-words').textContent = allWords.length;
  totalRounds = Math.ceil(allWords.length / ITEMS_PER_ROUND);
  document.getElementById('loading-screen').style.display = 'none';
  startRound();
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    rows.push(cols.map(c => c.replace(/^"|"$/g, '').trim()));
  }
  return rows;
}

// ── Round management ───────────────────────────────────────
function startRound() {
  matched = {};
  selectedLeft = null;
  selectedRight = null;
  lines = [];

  const available = allWords.map((_, i) => i).filter(i => !usedIndices.has(i));
  if (available.length === 0) {
    showResults();
    return;
  }

  const pick = shuffle(available).slice(0, ITEMS_PER_ROUND);
  pick.forEach(i => usedIndices.add(i));
  currentRound = pick.map(i => allWords[i]);

  document.getElementById('round-num').textContent = round;
  document.getElementById('next-btn').style.display = 'none';
  hideMessage();

  renderRound();
  document.getElementById('quiz-area').style.display = 'block';
}

function renderRound() {
  const leftCol = document.getElementById('left-col');
  const rightCol = document.getElementById('right-col');

  leftCol.innerHTML = '<div class="col-header">단어</div>';
  rightCol.innerHTML = '<div class="col-header">의미</div>';

  const svg = document.getElementById('line-canvas');
  svg.innerHTML = '';

  const leftOrder = shuffle([...Array(currentRound.length).keys()]);
  const rightOrder = shuffle([...Array(currentRound.length).keys()]);

  leftOrder.forEach((idx, pos) => {
    const w = currentRound[idx];
    const card = document.createElement('div');
    card.className = 'word-card';
    card.dataset.idx = idx;
    card.dataset.side = 'left';
    card.innerHTML = `
      <div class="word-jp">${w.original}</div>
      ${w.hiragana ? `<div class="word-hira">${w.hiragana}</div>` : ''}
      <div class="dot" id="dot-l-${idx}"></div>
    `;
    card.addEventListener('click', () => selectCard('left', idx, card));
    leftCol.appendChild(card);
  });

  rightOrder.forEach((idx, pos) => {
    const w = currentRound[idx];
    const card = document.createElement('div');
    card.className = 'word-card';
    card.dataset.idx = idx;
    card.dataset.side = 'right';
    card.innerHTML = `
      <div class="word-kr">${w.meaning}</div>
      <div class="dot" id="dot-r-${idx}"></div>
    `;
    card.addEventListener('click', () => selectCard('right', idx, card));
    rightCol.appendChild(card);
  });
}

// ── Selection & matching ───────────────────────────────────
function selectCard(side, idx, card) {
  if (card.classList.contains('matched')) return;

  if (side === 'left') {
    // Deselect previous left
    if (selectedLeft !== null) {
      const prev = document.querySelector(`.word-card[data-side="left"][data-idx="${selectedLeft}"]`);
      if (prev) prev.classList.remove('selected');
    }
    selectedLeft = idx;
    card.classList.add('selected');
  } else {
    if (selectedRight !== null) {
      const prev = document.querySelector(`.word-card[data-side="right"][data-idx="${selectedRight}"]`);
      if (prev) prev.classList.remove('selected');
    }
    selectedRight = idx;
    card.classList.add('selected');
  }

  if (selectedLeft !== null && selectedRight !== null) {
    checkMatch();
  }
}

function checkMatch() {
  const leftCard = document.querySelector(`.word-card[data-side="left"][data-idx="${selectedLeft}"]`);
  const rightCard = document.querySelector(`.word-card[data-side="right"][data-idx="${selectedRight}"]`);

  if (selectedLeft === selectedRight) {
    // Correct!
    scoreCorrect++;
    document.getElementById('score-correct').textContent = scoreCorrect;

    leftCard.classList.remove('selected');
    rightCard.classList.remove('selected');
    leftCard.classList.add('matched');
    rightCard.classList.add('matched');
    matched[selectedLeft] = selectedRight;

    drawLine(selectedLeft, selectedRight, true);

    selectedLeft = null;
    selectedRight = null;

    if (Object.keys(matched).length === currentRound.length) {
      setTimeout(() => {
        showMessage('✓ 라운드 완료!', 'success');
        document.getElementById('next-btn').style.display = 'inline-block';
      }, 300);
    }
  } else {
    // Wrong!
    scoreWrong++;
    document.getElementById('score-wrong').textContent = scoreWrong;

    leftCard.classList.remove('selected');
    rightCard.classList.remove('selected');
    leftCard.classList.add('wrong-flash');
    rightCard.classList.add('wrong-flash');

    drawLine(selectedLeft, selectedRight, false);

    setTimeout(() => {
      leftCard.classList.remove('wrong-flash');
      rightCard.classList.remove('wrong-flash');
      // Remove wrong line
      const wrongLine = document.getElementById('wrong-line-temp');
      if (wrongLine) wrongLine.remove();
    }, 500);

    selectedLeft = null;
    selectedRight = null;
  }
}

// ── SVG Lines ──────────────────────────────────────────────
function getDotPos(dotEl) {
  const arena = document.getElementById('arena');
  const arenaRect = arena.getBoundingClientRect();
  const dotRect = dotEl.getBoundingClientRect();
  return {
    x: dotRect.left + dotRect.width / 2 - arenaRect.left,
    y: dotRect.top + dotRect.height / 2 - arenaRect.top
  };
}

function drawLine(leftIdx, rightIdx, correct) {
  const dotL = document.getElementById(`dot-l-${leftIdx}`);
  const dotR = document.getElementById(`dot-r-${rightIdx}`);
  if (!dotL || !dotR) return;

  const p1 = getDotPos(dotL);
  const p2 = getDotPos(dotR);

  const svg = document.getElementById('line-canvas');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const cx1 = p1.x + (p2.x - p1.x) * 0.4;
  const cx2 = p1.x + (p2.x - p1.x) * 0.6;
  const d = `M ${p1.x} ${p1.y} C ${cx1} ${p1.y}, ${cx2} ${p2.y}, ${p2.x} ${p2.y}`;

  line.setAttribute('d', d);
  line.setAttribute('stroke', correct ? 'var(--correct)' : 'var(--wrong)');
  line.setAttribute('stroke-width', '2.5');
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', correct ? '0.8' : '0.6');
  if (!correct) line.setAttribute('id', 'wrong-line-temp');

  svg.appendChild(line);
}

function nextRound() {
  round++;
  startRound();
}

function skipRound() {
  round++;
  const available = allWords.map((_, i) => i).filter(i => !usedIndices.has(i));
  if (available.length === 0) { showResults(); return; }
  const pick = shuffle(available).slice(0, ITEMS_PER_ROUND);
  pick.forEach(i => usedIndices.add(i));
  currentRound = pick.map(i => allWords[i]);
  startRound();
}

// ── Results ────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const total = scoreCorrect + scoreWrong;
  const pct = total > 0 ? Math.round(scoreCorrect / total * 100) : 100;
  document.getElementById('results-pct').textContent = pct + '%';
  document.getElementById('results-detail').textContent = `정답 ${scoreCorrect}개 / 오답 ${scoreWrong}개 (총 ${total}번 시도)`;
  document.getElementById('results-screen').classList.add('show');
  setTimeout(() => {
    document.getElementById('results-bar').style.width = pct + '%';
  }, 100);
}

function restartQuiz() {
  usedIndices = new Set();
  scoreCorrect = 0;
  scoreWrong = 0;
  round = 1;
  document.getElementById('score-correct').textContent = 0;
  document.getElementById('score-wrong').textContent = 0;
  document.getElementById('results-screen').classList.remove('show');
  startRound();
}

// ── Utils ──────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showMessage(text, type) {
  const box = document.getElementById('msg-box');
  box.textContent = text;
  box.className = `message show ${type}`;
}

function hideMessage() {
  const box = document.getElementById('msg-box');
  box.className = 'message';
}

// ── Init ───────────────────────────────────────────────────
loadData();
</script>
